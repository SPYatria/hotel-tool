<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ホテルTikTokツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
    --accent: #ff3b5c; --accent2: #ff8c42; --text: #f0f0f5;
    --muted: #6b6b80; --border: #2a2a3a; --success: #00e5a0; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; padding: 20px 12px 80px; }
  .header { text-align: center; margin-bottom: 28px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 8px; }
  h1 { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; width: 100%; }
  .card label { display: block; font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }
  .api-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .api-section summary { cursor: pointer; font-size: 13px; color: var(--muted); list-style: none; }
  .api-section summary::before { content: '⚙️ '; }
  .api-section[open] summary { color: var(--text); margin-bottom: 12px; }
  .api-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none; }
  .api-input:focus { border-color: var(--accent); }
  .api-input + .api-input { margin-top: 8px; }
  .hotel-list-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .hotel-list-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; user-select: none; }
  .hotel-list-header label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; cursor: pointer; pointer-events: none; }
  .hotel-list-toggle { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .hotel-list-section.open .hotel-list-toggle { transform: rotate(180deg); }
  .hotel-list-body { display: none; padding: 0 12px 12px; }
  .hotel-list-section.open .hotel-list-body { display: block; }
  .hotel-search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 10px; }
  .hotel-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 200px; overflow-y: auto; }
  .hotel-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--text); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .hotel-chip:hover, .hotel-chip:active { border-color: var(--accent); color: var(--accent); background: rgba(255,59,92,0.08); }
  .hotel-add-row { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .hotel-add-input { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
  .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .input-row { display: flex; gap: 8px; }
  .hotel-input { flex: 1; min-width: 0; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 15px; font-weight: 700; outline: none; transition: border-color 0.2s; }
  .hotel-input:focus { border-color: var(--accent); }
  .hotel-input::placeholder { color: var(--muted); font-weight: 300; }
  .char-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .char-btn { background: var(--bg); border: 2px solid var(--border); border-radius: 10px; padding: 12px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; }
  .char-btn:last-child { grid-column: 1 / -1; }
  .char-btn.active { border-color: var(--accent); background: rgba(255,59,92,0.08); }
  .char-icon { font-size: 20px; }
  .char-name { font-size: 12px; font-weight: 700; color: var(--text); }
  .char-desc { font-size: 10px; color: var(--muted); text-align: center; }
  .char-btn.active .char-name { color: var(--accent); }
  .btn-generate { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 12px 16px; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; }
  .btn-generate:disabled { background: var(--muted); cursor: not-allowed; }
  .loading { display: none; text-align: center; padding: 40px 20px; color: var(--muted); }
  .loading.show { display: block; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .error-box { display: none; background: rgba(255,59,92,0.12); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px 16px; color: #ff8fa3; font-size: 14px; margin-bottom: 12px; }
  .error-box.show { display: block; }
  .result-section { display: none; }
  .result-section.show { display: block; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .result-hotel-name { font-size: 18px; font-weight: 900; color: var(--accent2); }
  .result-char-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); display: inline-block; margin-top: 4px; }
  .btn-copy-all { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 12px; cursor: pointer; white-space: nowrap; }
  .screens-grid { display: flex; flex-direction: column; gap: 10px; }
  .screen-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: slideIn 0.3s ease forwards; opacity: 0; transform: translateY(10px); }
  @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
  .screen-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); gap: 6px; }
  .screen-num { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .screen-title { font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-copy { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-copy.copied { border-color: var(--success); color: var(--success); background: rgba(0,229,160,0.1); }
  .screen-content { padding: 14px; font-size: 15px; line-height: 2; white-space: pre-wrap; color: #e0e0ee; word-break: break-all; }
  .price-loading { color: var(--muted); font-size: 13px; }
  .footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 11px; }
</style>
</head>

function loadHotels() {
  try {
    const saved = localStorage.getItem('hotel_list');
    return saved ? JSON.parse(saved) : DEFAULT_HOTELS;
  } catch { return DEFAULT_HOTELS; }
}

function saveHotels(list) {
  localStorage.setItem('hotel_list', JSON.stringify(list));
}

function renderHotels(filter) {
  const hotels = loadHotels();
  const grid = document.getElementById('hotelGrid');
  const filtered = filter ? hotels.filter(h => h.includes(filter)) : hotels;
  grid.innerHTML = filtered.map(h =>
    '<button class="hotel-chip" onclick="selectHotel(\'' + h.replace(/'/g, "\\'") + '\')">' + escapeHtml(h) + '</button>'
  ).join('');
}

function selectHotel(name) {
  document.getElementById('hotelName').value = name;
  closeHotelList();
}

function toggleHotelList() {
  const section = document.getElementById('hotelListSection');
  if (section.classList.contains('open')) {
    closeHotelList();
  } else {
    section.classList.add('open');
    renderHotels('');
  }
}

function closeHotelList() {
  document.getElementById('hotelListSection').classList.remove('open');
}

document.getElementById('hotelListHeader').addEventListener('click', toggleHotelList);
document.getElementById('hotelSearch').addEventListener('input', function() { renderHotels(this.value); });
document.getElementById('hotelAddBtn').addEventListener('click', addHotel);
document.getElementById('hotelAddInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addHotel(); });

function addHotel() {
  const input = document.getElementById('hotelAddInput');
  const name = input.value.trim();
  if (!name) return;
  const hotels = loadHotels();
  if (!hotels.includes(name)) {
    hotels.push(name);
    saveHotels(hotels);
    renderHotels(document.getElementById('hotelSearch').value);
  }
  input.value = '';
}

// ============================================================
// フレーズ時限管理
// ============================================================
const PHRASE_LIMIT = 10;
const BANNED_ALWAYS = ['神ホテル', '最高すぎ', 'ヤバい', '神すぎ', '天国すぎ', 'レベチ', '沼った', '次元が違う'];

function getPhraseLedger() {
  try { return JSON.parse(localStorage.getItem('phrase_ledger') || '{}'); } catch { return {}; }
}

function recordPhrases(text) {
  const ledger = getPhraseLedger();
  const now = Date.now();
  BANNED_ALWAYS.forEach(p => {
    if (text.includes(p)) {
      ledger[p] = (ledger[p] || []).concat(now);
    }
  });
  localStorage.setItem('phrase_ledger', JSON.stringify(ledger));
}

function getBannedPhrases() {
  const ledger = getPhraseLedger();
  const banned = [...BANNED_ALWAYS];
  Object.entries(ledger).forEach(([p, times]) => {
    if (times.length > 0 && times.length < PHRASE_LIMIT && !banned.includes(p)) {
      banned.push(p);
    }
  });
  return banned;
}

// ============================================================

  const priceCard = document.getElementById('priceCard');

  const appId = localStorage.getItem('rakuten_app_id') || '';
  const affId = localStorage.getItem('rakuten_aff_id') || '';
  const end = charProfiles[charKey].endings;

  try {
    if (!appId) throw new Error('楽天アプリIDが未設定');

    // 楽天トラベル SimpleHotelSearch API
    const searchUrl = 'https://app.rakuten.co.jp/services/api/Travel/SimpleHotelSearch/20170426' +
      '?applicationId=' + encodeURIComponent(appId) +
      (affId ? '&affiliateId=' + encodeURIComponent(affId) : '') +
      '&keyword=' + encodeURIComponent(hotelName) +
      '&hits=1&formatVersion=2';

    const res = await fetch(searchUrl);
    if (!res.ok) throw new Error('楽天API error: ' + res.status);
    const data = await res.json();

    let priceText;

    if (data.hotels && data.hotels.length > 0) {
      const info = data.hotels[0].hotelBasicInfo;
      const minCharge = info.hotelMinCharge;

      if (minCharge && minCharge > 0) {
        const priceNum = parseInt(minCharge).toLocaleString('ja-JP');
        priceText = '最安' + priceNum + '円〜' + end.price + '\n（料金は空室状況で変動）\n最新価格はリンクから' + end.link;
      } else {
        priceText = '料金は公式サイトで\n確認してみてね\n最新価格はリンクから' + end.link;
      }
    } else {
      // ヒットしなかった場合はGeminiフォールバック
      throw new Error('楽天に該当ホテルなし');
    }

    priceCard.innerHTML =
      '<div class="screen-header"><span class="screen-num">SCREEN 18</span><span class="screen-title">料金情報 <span style="color:var(--success);font-size:10px;">楽天取得</span></span><button class="btn-copy" onclick="copyById(\'price-text\', this)">📋 コピー</button></div>' +
      '<div class="screen-content" id="price-text">' + escapeHtml(priceText) + '</div>';

  } catch(e) {
    console.warn('楽天API失敗、Geminiで検索:', e.message);

    // Geminiフォールバック
    try {
      const pricePrompt = hotelName + 'の最安宿泊料金を検索してください。料金が見つかったら「PRICE:数字のみ」の形式だけで返してください。例：PRICE:8500。見つからない場合はPRICE:不明とだけ返してください。他の文章は一切不要です。';
      const res2 = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tools: [{ google_search: {} }],
            contents: [{ role: 'user', parts: [{ text: pricePrompt }] }],
            generationConfig: { maxOutputTokens: 100 }
          })
        }
      );
      const d2 = await res2.json();
      const t2 = (d2.candidates || []).map(c => (c.content.parts || []).filter(p => p.text).map(p => p.text).join('')).join('');
      const m2 = t2.match(/PRICE[:\s]+([\d,，]+|不明)/);
      const price2 = m2 ? m2[1].replace(/[,，]/g, '') : '不明';

      let priceText2;
      if (price2 === '不明') {
        priceText2 = '料金は公式サイトで\n確認してみてね\n最新価格はリンクから' + end.link;
      } else {
        priceText2 = '平日一人' + price2 + '円〜' + end.price + '\n（料金は空室状況で変動）\n最新価格はリンクから' + end.link;
      }

      priceCard.innerHTML =
        '<div class="screen-header"><span class="screen-num">SCREEN 18</span><span class="screen-title">料金情報 <span style="color:var(--muted);font-size:10px;">Gemini取得</span></span><button class="btn-copy" onclick="copyById(\'price-text\', this)">📋 コピー</button></div>' +
        '<div class="screen-content" id="price-text">' + escapeHtml(priceText2) + '</div>';

    } catch(e2) {
      priceCard.innerHTML =
        '<div class="screen-header"><span class="screen-num">SCREEN 18</span><span class="screen-title">料金情報</span></div>' +
        '<div class="screen-content price-loading">料金の取得に失敗しました</div>';
    }
  }
}

// ============================================================
// テキスト生成
// ============================================================
const loadingMessages = ['ホテル情報を調べています...', 'ファクトチェック中...', 'TikTokテキスト生成中...', '画面を組み立てています...'];
let loadingInterval;

document.getElementById('generateBtn').addEventListener('click', generateText);
document.getElementById('hotelName').addEventListener('keydown', e => { if (e.key === 'Enter') generateText(); });

async function generateText() {
  const hotelName = document.getElementById('hotelName').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!hotelName) { showError('ホテル名を入力してください'); return; }
  if (!apiKey) {
    document.getElementById('apiSection').open = true;
    showError('APIキーを入力してください（上の⚙️をタップ）');
    return;
  }

  hideError();
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('generateBtn').disabled = true;

  let li = 0;
  const ltEl = document.getElementById('loadingText');
  ltEl.textContent = loadingMessages[0];
  loadingInterval = setInterval(() => { li = (li + 1) % loadingMessages.length; ltEl.textContent = loadingMessages[li]; }, 2500);

  // 翌週月曜火曜
  const today = new Date();
  const dow = today.getDay();
  const daysToMon = dow === 0 ? 1 : 8 - dow;
  const nextMon = new Date(today); nextMon.setDate(today.getDate() + daysToMon);
  const nextTue = new Date(nextMon); nextTue.setDate(nextMon.getDate() + 1);
  const fmt = d => d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  const checkIn = fmt(nextMon);
  const checkOut = fmt(nextTue);

  const char = charProfiles[selectedChar];
  const banned = getBannedPhrases();
  const bannedStr = banned.length > 0 ? '\n【禁止フレーズ】\n' + banned.map(p => '- ' + p).join('\n') + '\nこれらは絶対に使わないこと。' : '';

  const prompt = char.prompt + '\n\n【タスク】\nホテル名：' + hotelName + '\n\nまず' + hotelName + 'が2026年現在も営業しているか、最新のサービスや設備を確認してください。\n\n以下のルールで17画面分のテキストを生成してください。\n\n【ルール】\n- 口調は上記キャラクターに徹底して合わせる\n- 句読点（。、！？）は一切使わない\n- SNSのスマホユーザー視点最優先\n- 視聴者が「行きたい」と妄想できる強いパワーワードを使う\n- 各画面は3行\n- 1行は最大12文字以内（絶対に超えない）\n- 文字数の緩急をつける\n- 同じフレーズ・同じ言い回しを17画面で絶対に繰り返さない' + bannedStr + '\n\n【構成】\n- 1画面目：冒頭フック\n- 2画面目：ホテル名と概要\n- 3〜16画面目：設備・部屋・サービス・ロケーションなど\n- 17画面目：締め・CTA\n\n【出力形式】\n===SCREEN_1===\nTITLE:冒頭フック\nTEXT:\n（3行）\n\n以下17画面まで同様。必ず17画面全部出力してください。';

  try {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 60000);

    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        signal: controller.signal,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tools: [{ google_search: {} }],
          contents: [{ role: 'user', parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 4000 }
        })
      }
    );
    clearTimeout(tid);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error ? err.error.message : 'APIエラー: ' + res.status);
    }

    const data = await res.json();
    let text = '';
    if (data.candidates && data.candidates.length > 0) {
      const cand = data.candidates[0];
      if (cand.content && cand.content.parts) {
        text = cand.content.parts.filter(p => p.text).map(p => p.text).join('');
      }
    }
    if (!text) throw new Error('テキストが生成されませんでした');

    parseAndDisplay(hotelName, text);
    recordPhrases(text);
    fetchPrice(hotelName, checkIn, checkOut, apiKey, selectedChar);

  } catch(e) {
    if (e.name === 'AbortError') {
      showError('タイムアウト：もう一度試してください');
    } else {
      showError('エラー: ' + e.message);
    }
  } finally {
    clearInterval(loadingInterval);
    document.getElementById('loading').classList.remove('show');
    document.getElementById('generateBtn').disabled = false;
  }
}

function parseAndDisplay(hotelName, rawText) {
  const screens = [];
  const blocks = rawText.split(/===SCREEN_\d+===/);
  for (let block of blocks) {
    block = block.trim();
    if (!block) continue;
    const tm = block.match(/TITLE:(.+)/);
    const cm = block.match(/TEXT:\n([\s\S]+)/);
    if (tm && cm) screens.push({ title: tm[1].trim(), text: cm[1].trim() });
  }
  if (screens.length === 0) { showError('テキストの解析に失敗しました。もう一度試してください。'); return; }

  document.getElementById('resultHotelName').textContent = hotelName;
  document.getElementById('resultCharBadge').textContent = charProfiles[selectedChar].name;

  const grid = document.getElementById('screensGrid');
  grid.innerHTML = '';

  screens.forEach((screen, i) => {
    const card = document.createElement('div');
    card.className = 'screen-card';
    card.style.animationDelay = (i * 0.04) + 's';
    const id = 'screen-text-' + i;
    card.innerHTML =
      '<div class="screen-header"><span class="screen-num">SCREEN ' + String(i+1).padStart(2,'0') + '</span><span class="screen-title">' + escapeHtml(screen.title) + '</span><button class="btn-copy" onclick="copyById(\'' + id + '\', this)">📋 コピー</button></div>' +
      '<div class="screen-content" id="' + id + '">' + escapeHtml(screen.text) + '</div>';
    grid.appendChild(card);
  });

  const priceCard = document.createElement('div');
  priceCard.className = 'screen-card';
  priceCard.id = 'priceCard';
  priceCard.style.display = 'none';
  grid.appendChild(priceCard);

  document.getElementById('resultSection').classList.add('show');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// ユーティリティ
// ============================================================
function copyById(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✓ 完了';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

document.getElementById('copyAllBtn').addEventListener('click', function() {
  const cards = document.querySelectorAll('.screen-content');
  let all = '';
  cards.forEach((el, i) => { all += '【画面' + (i+1) + '】\n' + el.textContent + '\n\n'; });
  navigator.clipboard.writeText(all.trim()).then(() => {
    this.textContent = '✓ 完了！';
    setTimeout(() => { this.textContent = '📋 全部コピー'; }, 2000);
  });
});

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
}

function hideError() { document.getElementById('errorBox').classList.remove('show'); }

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
